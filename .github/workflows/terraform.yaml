name: Terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Executar o terraform apply ?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  id-token: write
  contents: read

jobs: 
  job1:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with: 
          role-to-assume: arn:aws:iam::890871562295:role/GitHubInfraRole
          aws-region: us-east-2

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2 

      - name: Terraform init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan.tfout 

      - name: Terraform apply
        run: terraform apply --auto-approve tfplan.tfout
        if: github.event.inputs.logLevel == 'true'



